<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft 物品组件生成器 | Item Component Builder</title>
<style>
/* ================================================================
   MINECRAFT-STYLE UI — Inspired by minecraft.net & in-game UI
   ================================================================ */
:root {
  /* Minecraft Official Color Palette — from minecraft.net */
  --mc-green: #52a535;
  --mc-green-hover: #6cc349;
  --mc-green-dark: #3c8527;
  --mc-green-glow: rgba(82,165,53,.35);
  --mc-dirt: #66412c;
  --mc-dirt-dark: #492d1f;
  --mc-stone: #aba09c;
  --mc-stone-dark: #6b6562;
  --mc-stone-bg: #171615;
  --mc-text: #fcf5f1;
  --mc-text-light: #fff;
  --mc-text-dim: #aba09c;
  --mc-text-dark: #6b6562;
  --mc-wood: #805539;
  --mc-wood-light: #976746;
  --mc-wood-dark: #66412c;
  --mc-panel: #262423;
  --mc-panel-hover: #3d3938;
  --mc-border: #3d3938;
  --mc-border-light: #6b6562;
  --mc-danger: #a83232;
  --mc-danger-hover: #c94444;
  --mc-info: #2a6b9b;
  --font-mc: 'Minecraft AE Pixel','Minecraft AE',monospace;
  --font-body: 'Minecraft AE Pixel','Minecraft AE',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow:hidden}body{height:100%;margin:0}
body{
  font-family:var(--font-body);background:var(--mc-stone-bg);color:var(--mc-text);user-select:none;
  display:flex;flex-direction:column;
}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--mc-stone-bg);border-left:1px solid var(--mc-border)}
::-webkit-scrollbar-thumb{background:var(--mc-stone-dark);border:1px solid var(--mc-border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--mc-stone)}

/* HEADER — Grass Block */
.header{
  height:52px;background:var(--mc-green);
  border-bottom:4px solid #3D5A0E;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  position:relative;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.6);
}
.header::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;height:4px;
  background:repeating-linear-gradient(90deg,#3A2210 0px,#3A2210 4px,#5C3A1E 4px,#5C3A1E 8px);
}
.header-title{display:flex;align-items:center;gap:10px}
.header-icon{
  width:32px;height:32px;background:var(--mc-wood-dark);
  border:2px solid #4A3018;border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -1px 0 rgba(0,0,0,.3);
}
.header-title h1{font-family:var(--font-mc);font-size:11px;color:var(--mc-text-light);text-shadow:2px 2px 0 rgba(0,0,0,.5);letter-spacing:.5px}
.header-title .subtitle{font-size:9px;color:rgba(255,255,255,.55);font-family:var(--font-mc);letter-spacing:.5px}
.header-badge{
  background:rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.15);
  padding:3px 10px;border-radius:3px;font-family:var(--font-mc);
  font-size:9px;color:var(--mc-text-light);text-shadow:1px 1px 0 rgba(0,0,0,.4);letter-spacing:.5px;
}

/* LAYOUT */
.main-container{display:flex;flex:1;overflow:hidden;gap:2px;background:var(--mc-stone-bg);position:relative}

/* PANEL BASE */
.panel{display:flex;flex-direction:column;background:var(--mc-panel);border:1px solid var(--mc-border);position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,.06)}
.panel-header{
  padding:7px 12px;background:var(--mc-panel-hover);border-bottom:2px solid #111;
  font-family:var(--font-mc);font-size:8.5px;color:var(--mc-text);
  display:flex;align-items:center;gap:7px;flex-shrink:0;letter-spacing:.5px;text-shadow:1px 1px 0 rgba(0,0,0,.4);
}
.panel-header .icon{font-size:13px}
.panel-body{flex:1;overflow:hidden;position:relative}

/* PALETTE */
.palette-panel{width:230px;min-width:230px}
.palette-panel .panel-header{border-top:1px solid var(--mc-green)}
.palette-tabs{display:flex;flex-wrap:wrap;gap:2px;padding:6px 6px 4px;background:#1A1A1A;border-bottom:1px solid var(--mc-border)}
.palette-tab{
  padding:3px 7px;font-size:9px;cursor:pointer;border:1px solid var(--mc-border);
  background:var(--mc-panel);color:var(--mc-text-dim);transition:all .15s;font-family:var(--font-body);border-radius:2px;
}
.palette-tab:hover{background:var(--mc-panel-hover);color:var(--mc-text);border-color:var(--mc-border-light)}
.palette-tab.active{background:var(--mc-green);color:#fff;border-color:var(--mc-green-dark);text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.palette-scroll{height:100%;overflow-y:auto;padding:6px}

.palette-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:3px;
  border-radius:3px;cursor:grab;border:1px solid transparent;transition:all .15s;font-size:12px;
  background:rgba(255,255,255,.03);
}
.palette-item:hover{border-color:var(--mc-border-light);background:rgba(255,255,255,.07)}
.palette-item:active{cursor:grabbing}
.palette-item .item-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.palette-item .item-name{flex:1;font-size:12px;color:var(--mc-text)}
.palette-item .plus-btn{
  width:20px;height:20px;border:1px solid var(--mc-border);background:rgba(0,0,0,.3);
  color:var(--mc-text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;border-radius:2px;transition:all .15s;flex-shrink:0;
}
.palette-item .plus-btn:hover{background:var(--mc-green);color:#fff;border-color:var(--mc-green-dark)}

/* WORKSPACE */
.workspace-panel{flex:1;min-width:280px;min-height:0}
.workspace-panel .panel-header{border-top:1px solid var(--mc-wood)}
.workspace-toolbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:#1A1A1A;border-bottom:1px solid var(--mc-border);flex-shrink:0}
.workspace-toolbar .block-count{font-size:10px;color:var(--mc-text-dim);margin-right:auto}
.workspace-area{flex:1;overflow-y:auto;padding:12px;min-height:0}

/* MC Buttons */
.mc-btn{font-family:var(--font-body);font-size:10px;cursor:pointer;border:none;padding:4px 10px;color:var(--mc-text-light);border-radius:2px;transition:all .1s;position:relative;text-shadow:1px 1px 0 rgba(0,0,0,.3);display:inline-flex;align-items:center;gap:4px}
.mc-btn:active{transform:translateY(1px)}
.mc-btn-green{background:var(--mc-green);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 2px 0 var(--mc-green-dark)}
.mc-btn-green:hover{background:var(--mc-green-dark)}
.mc-btn-danger{background:var(--mc-danger);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 2px 0 #7A2020}
.mc-btn-danger:hover{background:var(--mc-danger-hover)}
.mc-btn-ghost{background:var(--mc-panel-hover);box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 2px 0 #1A1A1A}
.mc-btn-ghost:hover{background:var(--mc-border)}

/* Empty state */
.workspace-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;gap:10px;padding:20px}
.workspace-empty .big-icon{font-size:42px;opacity:.3}
.workspace-empty p{font-size:13px;color:var(--mc-text-dim);line-height:1.6}
.workspace-empty .hint{font-size:10px;color:var(--mc-text-dark)}

/* OUTPUT */
.output-panel{width:380px;min-width:320px;min-height:0;overflow:hidden}
.output-panel .panel-header{border-top:1px solid var(--mc-info)}
.output-tabs{display:flex;gap:1px}
.output-tab{padding:4px 10px;font-size:9px;cursor:pointer;background:#1A1A1A;color:var(--mc-text-dim);border:1px solid var(--mc-border);border-bottom:none;transition:all .15s;font-family:var(--font-body);border-radius:2px 2px 0 0;margin-top:2px}
.output-tab:hover{background:var(--mc-panel-hover);color:var(--mc-text)}
.output-tab.active{background:var(--mc-panel);color:var(--mc-green-hover);border-color:var(--mc-border-light);font-weight:bold}
.output-content{flex:1;overflow:auto;position:relative;min-height:0}
.output-content pre{margin:0;padding:14px;font-size:11px;font-family:var(--font-mc);color:var(--mc-text);line-height:1.5;white-space:pre-wrap;word-break:break-all;min-height:100%}
.output-content .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mc-text-dark);text-align:center;gap:8px;padding:20px}
.output-content .placeholder .icon{font-size:28px;opacity:.3}
.output-content .placeholder p{font-size:12px}
.output-actions{padding:6px 10px;background:#1A1A1A;border-top:1px solid var(--mc-border);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;align-items:center}.output-char-count{font-size:9px;color:var(--mc-text-dark);margin-left:auto}
.output-error{color:#E74C3C;padding:10px 14px;font-size:11px;background:rgba(231,76,60,.08);border-left:3px solid #E74C3C;margin:6px;border-radius:2px;display:none}

/* BASE ITEM BLOCK */
.block-base-item{background:#2A1F14;border:2px solid var(--mc-wood-dark);border-radius:4px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.block-base-item .block-header{background:var(--mc-dirt);padding:6px 12px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #2D1A0A;font-size:11px;color:var(--mc-text-light);font-weight:bold;text-shadow:1px 1px 0 rgba(0,0,0,.4);font-family:var(--font-mc);font-size:8.5px;letter-spacing:.5px}
.block-base-item .block-header .icon{font-size:16px}
.block-base-item .block-body{padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.block-base-item .block-body label{font-size:10px;color:var(--mc-text-dim);min-width:36px;font-family:var(--font-mc);letter-spacing:.3px}
.block-base-item select,.block-base-item input{background:#14100A;color:var(--mc-text);border:1px solid var(--mc-wood-dark);padding:4px 8px;border-radius:2px;font-size:11px;font-family:var(--font-body)}
.block-base-item select{min-width:160px}
.block-base-item input[type=number]{width:55px}
.block-base-item .cmd-options{margin-top:6px;padding-top:6px;border-top:1px solid var(--mc-wood-dark);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.block-base-item .cmd-options label{font-size:10px;color:var(--mc-text-dim)}

/* COMPONENT BLOCKS */
.component-block{background:#282828;border:2px solid #3A3A3A;border-radius:4px;overflow:hidden;margin-bottom:6px;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05)}
.component-block:hover{border-color:#555}.component-block.disabled{opacity:.45}.component-block.disabled .block-body{display:none}
.component-block .block-header{padding:5px 10px;display:flex;align-items:center;gap:6px;cursor:move;user-select:none;font-size:11px;font-weight:bold;color:var(--mc-text-light);border-bottom:1px solid rgba(0,0,0,.3);text-shadow:1px 1px 0 rgba(0,0,0,.4);position:relative}
.component-block .block-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.06)}
.component-block .block-header .drag-handle{font-size:13px;opacity:.4;cursor:grab;width:16px;text-align:center;letter-spacing:-2px}
.component-block .block-header .drag-handle:active{cursor:grabbing}
.component-block .block-header .block-icon{font-size:14px}
.component-block .block-header .block-name{flex:1;font-size:11px}
.component-block .block-header .block-controls{display:flex;gap:3px}
.component-block .block-header .ctrl-btn{width:20px;height:20px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);color:rgba(255,255,255,.55);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;border-radius:2px}
.component-block .block-header .ctrl-btn:hover{background:rgba(255,255,255,.1);color:var(--mc-text)}
.component-block .block-header .ctrl-btn.del:hover{background:var(--mc-danger);color:#fff;border-color:#7A2020}
.component-block .block-header .ctrl-btn.toggle.active{background:var(--mc-green);color:#fff;border-color:var(--mc-green-dark)}
.component-block .block-body{padding:10px 12px;font-size:11px}

/* FORM ELEMENTS */
.field-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.field-row label{font-size:10px;color:var(--mc-text-dim);min-width:44px;font-family:var(--font-mc);letter-spacing:.3px}
.block-body input[type=text],.block-body input[type=number],.block-body textarea,.block-body select{background:#141414;color:var(--mc-text);border:1px solid #3A3A3A;border-radius:2px;padding:4px 7px;font-size:11px;font-family:var(--font-body);transition:border-color .2s}
.block-body input:focus,.block-body textarea:focus,.block-body select:focus{border-color:var(--mc-green);outline:none;box-shadow:0 0 6px var(--mc-green-glow)}
.block-body textarea{resize:vertical;min-height:36px;width:100%;font-family:var(--font-mc);font-size:10px}
.block-body input[type=text]{min-width:100px;flex:1}
.block-body input[type=number]{width:70px}
.block-body select{min-width:90px}
.checkbox-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.checkbox-row input[type=checkbox]{accent-color:var(--mc-green)}
.checkbox-row label{font-size:10px;color:var(--mc-text-dim);cursor:pointer}
.field-desc{font-size:9px;color:var(--mc-text-dark);margin-left:44px;margin-bottom:4px}

/* LISTS */
.kv-list,.dyn-list{width:100%}
.kv-item,.dyn-item{display:flex;align-items:center;gap:5px;margin-bottom:3px;padding:4px 6px;background:rgba(0,0,0,.15);border-radius:2px}
.kv-item .kv-key{flex:1}.kv-item .kv-val{width:55px}
.kv-item .kv-del,.dyn-item .dyn-del{width:18px;height:18px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:#C0392B;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border-radius:2px}
.kv-item .kv-del:hover,.dyn-item .dyn-del:hover{background:var(--mc-danger);color:#fff}
.kv-add-btn,.dyn-add-btn{padding:3px 9px;font-size:10px;cursor:pointer;border:1px dashed var(--mc-border-light);border-radius:2px;background:transparent;color:var(--mc-text-dim);margin-top:2px;transition:all .15s}
.kv-add-btn:hover,.dyn-add-btn:hover{border-color:var(--mc-green);color:var(--mc-green-hover)}
.dyn-item input{flex:1}

/* DRAG */
.drag-overlay{position:fixed;pointer-events:none;z-index:9999;opacity:.9;transform:scale(.95);font-size:12px;padding:6px 14px;border-radius:3px;color:#fff;font-family:var(--font-body);box-shadow:0 4px 16px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.2)}
.drag-overlay-droppable{outline:2px dashed var(--mc-green)!important;outline-offset:-2px;background:rgba(94,124,22,.08)!important}
.dragging-source{opacity:.25}
.drop-zone-highlight{border:2px dashed var(--mc-green)!important;background:rgba(94,124,22,.06)!important;border-radius:4px;min-height:60px}

/* TOAST */
.toast{position:fixed;top:58px;right:16px;z-index:10000;padding:10px 16px;font-size:11px;color:var(--mc-text-light);transform:translateX(120%);opacity:0;transition:all .35s cubic-bezier(.68,-.55,.27,1.55);box-shadow:0 4px 16px rgba(0,0,0,.5);max-width:320px;border:1px solid rgba(255,255,255,.1);border-radius:3px;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.toast.show{transform:translateX(0);opacity:1}
.toast.success{background:var(--mc-green);border-color:var(--mc-green-dark)}
.toast.error{background:var(--mc-danger);border-color:#7A2020}
.toast.info{background:var(--mc-info);border-color:#1A5070}

/* RICH TEXT MODAL */
.rt-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.rt-modal{background:var(--mc-panel);border:2px solid var(--mc-green);border-radius:6px;width:620px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.6);animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.rt-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:2px solid #1A1A1A;font-size:13px;font-weight:bold;color:var(--mc-text);font-family:var(--font-mc);letter-spacing:.5px}
.rt-close-btn{background:none;border:none;color:var(--mc-text-dim);font-size:18px;cursor:pointer;padding:0 4px}
.rt-close-btn:hover{color:#E74C3C}
.rt-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.rt-segment{background:#1A1A1A;border:1px solid #3A3A3A;border-radius:4px;padding:10px;position:relative;transition:border-color .2s}
.rt-seg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rt-seg-label{font-size:10px;color:var(--mc-text-dim);font-weight:600}
.rt-seg-del{background:none;border:none;color:#E74C3C;font-size:12px;cursor:pointer;padding:2px 6px;border-radius:3px}
.rt-seg-del:hover{background:rgba(231,76,60,.12)}
.rt-seg-row{display:flex;gap:6px;margin-bottom:4px;align-items:center}
.rt-seg-text{flex:1;background:#111;border:1px solid #3A3A3A;border-radius:2px;padding:5px 8px;color:var(--mc-text);font-size:12px}
.rt-seg-text:focus{border-color:var(--mc-green);outline:none;box-shadow:0 0 4px var(--mc-green-glow)}
.rt-seg-color{background:#111;border:1px solid #3A3A3A;border-radius:2px;padding:4px 7px;color:var(--mc-text);font-size:11px;cursor:pointer}
.rt-seg-color:focus{border-color:var(--mc-green);outline:none}
.rt-format-row{display:flex;gap:3px}
.rt-fmt-btn{width:30px;height:26px;border:1px solid #3A3A3A;background:#111;color:var(--mc-text-dim);border-radius:2px;cursor:pointer;font-size:12px;font-weight:bold;display:flex;align-items:center;justify-content:center;transition:all .12s}
.rt-fmt-btn:hover{border-color:var(--mc-border-light);color:var(--mc-text)}
.rt-fmt-btn.active{background:var(--mc-green);border-color:var(--mc-green-dark);color:#fff}
.rt-add-btn{align-self:flex-start;background:#1A1A1A;border:1px dashed var(--mc-border-light);border-radius:4px;color:var(--mc-text-dim);padding:6px 14px;cursor:pointer;font-size:11px;transition:all .12s}
.rt-add-btn:hover{border-color:var(--mc-green);color:var(--mc-green);background:rgba(94,124,22,.06)}
.rt-preview{background:#111;border:1px solid #3A3A3A;border-radius:4px;padding:10px 14px;margin-top:3px;min-height:36px}
.rt-preview-label{font-size:9px;color:var(--mc-text-dark);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.rt-preview-text{font-size:13px;word-break:break-all;line-height:1.5}
.rt-footer{display:flex;justify-content:flex-end;gap:8px;padding:10px 16px;border-top:2px solid #1A1A1A}
.rt-btn{padding:6px 16px;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:bold;transition:all .12s;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.rt-btn-cancel{background:#3A3A3A;color:var(--mc-text-dim)}
.rt-btn-cancel:hover{background:#4A4A4A;color:var(--mc-text)}
.rt-btn-save{background:var(--mc-green);color:#fff}
.rt-btn-save:hover{background:var(--mc-green-hover)}

/* RESPONSIVE */
@media(max-width:1100px){.palette-panel{width:200px;min-width:180px}.output-panel{width:300px;min-width:260px}}
@media(max-width:768px){
  .main-container{flex-direction:column}
  .palette-panel{width:100%;min-width:unset;height:200px}
  .output-panel{width:100%;min-width:unset;height:220px}
  .header-title h1{font-size:9px}
  .header-title .subtitle{display:none}
}
</style>
</head>
<body>

<!-- ======== HEADER ======== -->
<header class="header">
  <div class="header-title">
    <div class="header-icon">⛏️</div>
    <div>
      <h1>物品组件生成器</h1>
      <div class="subtitle">Item Component Builder</div>
    </div>
  </div>
  <div class="header-badge">26.1.2</div>
</header>

<!-- ======== MAIN ======== -->
<div class="main-container">

  <!-- Left: Palette -->
  <div class="palette-panel panel" id="palettePanel">
    <div class="panel-header"><span class="icon">🧱</span> 积木工具箱</div>
    <div class="palette-tabs" id="paletteTabs"></div>
    <div class="palette-scroll panel-body" id="paletteContent"></div>
  </div>

  <!-- Center: Workspace -->
  <div class="workspace-panel panel" id="workspacePanel">

// ===== STATE =====
let workspaceBlocks = [];
let outputTab = 'command';

function getBaseItem(){
  const customVal = document.getElementById('itemCustomInput').value.trim();
  const selectVal = document.getElementById('itemSelect').value;
  return customVal || selectVal || 'minecraft:diamond_sword';
}
function getBaseConfig(){
  return {
    item: getBaseItem(),
    target: document.getElementById('targetSelector').value,
    count: parseInt(document.getElementById('itemCount').value) || 1,
    includePrefix: document.getElementById('includeCmdPrefix').checked
  };
}

// ===== PALETTE =====
function renderPalette(){
  const catKeys = Object.keys(CATEGORIES);
  const tabsEl = document.getElementById('paletteTabs');
  tabsEl.innerHTML = catKeys.map(c =>
    `<button class="palette-tab" data-cat="${c}" onclick="switchPaletteTab('${c}')">${CATEGORIES[c].icon} ${CATEGORIES[c].name}</button>`
  ).join('');
  if(!document.querySelector('.palette-tab.active')){
    document.querySelector('.palette-tab')?.classList.add('active');
  }
  renderPaletteContent(catKeys[0]);
}
function switchPaletteTab(catId){
  document.querySelectorAll('.palette-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===catId));
  renderPaletteContent(catId);
}
function renderPaletteContent(catId){
  const el = document.getElementById('paletteContent');
  const defs = Object.values(COMPONENT_DEFS).filter(d => d.category === catId);
  const cat = CATEGORIES[catId];
  el.innerHTML = defs.map(d => `
    <div class="palette-item" draggable="true"
         data-component-id="${d.id}"
         ondragstart="onPaletteDragStart(event,'${d.id}')"
         onclick="addBlockToWorkspace('${d.id}')"
         style="border-left:3px solid ${cat.color}">
      <span class="item-icon">${d.icon}</span>
      <span class="item-name">${d.name}</span>
      <button class="plus-btn" onclick="event.stopPropagation();addBlockToWorkspace('${d.id}')">+</button>
    </div>
  `).join('');
}

// ===== WORKSPACE RENDER =====
function renderWorkspace(){
  const listEl = document.getElementById('blockList');
  const hintEl = document.getElementById('workspaceHint');
  if(workspaceBlocks.length === 0){
    hintEl.style.display = 'flex';
    listEl.innerHTML = '';
    updateBlockCount();
    generateOutput();
    return;
  }
  hintEl.style.display = 'none';
  listEl.innerHTML = workspaceBlocks.map((block, idx) => {
    const def = COMPONENT_DEFS[block.componentId];
    if(!def) return '';
    const cat = CATEGORIES[def.category];
    const color = cat ? cat.color : '#666';
    const isDisabled = block.disabled || false;
    return `
      <div class="component-block ${isDisabled?'disabled':''}"
           data-index="${idx}" draggable="true"
           ondragstart="onBlockDragStart(event,${idx})"
           ondragover="onBlockDragOver(event,${idx})"
           ondrop="onBlockDrop(event,${idx})"
           ondragend="onBlockDragEnd(event)"
           style="border-color:${color}">
        <div class="block-header" style="background:${color}">
          <span class="drag-handle">⠿</span>
          <span class="block-icon">${def.icon}</span>
          <span class="block-name">${def.name}</span>
          <div class="block-controls">
            <button class="ctrl-btn toggle ${!isDisabled?'active':''}" onclick="toggleBlock(${idx})" title="启用/禁用">${isDisabled?'○':'●'}</button>
            <button class="ctrl-btn del" onclick="removeBlock(${idx})" title="删除">✕</button>
          </div>
        </div>
        <div class="block-body">${renderBlockParams(def, block.params || {}, idx)}</div>
      </div>`;
  }).join('');
  updateBlockCount();
  generateOutput();
}

function renderBlockParams(def, params, idx){
  if(def.special === 'flag'){
    return '<div style="color:#9B8F7A;font-size:10px;padding:4px 0">✅ 此组件为标记型 — 只需添加即可生效</div>';
  }
  return def.params.map(p => {
    const val = params[p.key] !== undefined ? params[p.key] : p.default;
    return renderParamField(p, val, idx);
  }).join('');
}

function renderParamField(p, val, idx){
  switch(p.type){
    case 'text': return `<div class="field-row"><label>${p.label}</label><input type="text" value="${escHtml(String(val||''))}" onchange="updateBlockParam(${idx},'${p.key}',this.value)">${p.desc?`<span style="font-size:9px;color:var(--mc-text-dark)">${p.desc}</span>`:''}</div>`;
    case 'richtext': {
      const summary = Array.isArray(val) ? val.map(s=>s.text).join('') : (val||'');
      const preview = summary ? escHtml(summary.substring(0, 40))+(summary.length>40?'…':'') : '<span style="color:#6B6050;font-style:italic">未设置</span>';
      return `<div class="field-row" style="flex-direction:column;align-items:stretch"><label>${p.label}</label><div style="display:flex;gap:8px;align-items:center"><span style="flex:1;font-size:11px;color:var(--mc-text-dim);padding:5px 10px;background:#141414;border-radius:2px;border:1px solid #3A3A3A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${preview}</span><button class="dyn-add-btn" onclick="openRichTextEditor(${idx},'${p.key}')" style="white-space:nowrap">✏️ 编辑</button></div>${p.desc?`<span style="font-size:9px;color:var(--mc-text-dark);margin-top:3px">${p.desc}</span>`:''}</div>`;
    }
    case 'number': return `<div class="field-row"><label>${p.label}</label><input type="number" value="${val}" min="${p.min||0}" max="${p.max||999999}" step="${p.step||1}" onchange="updateBlockParam(${idx},'${p.key}',parseFloat(this.value)||0)"></div>`;
    case 'checkbox': return `<div class="checkbox-row"><input type="checkbox" ${val?'checked':''} onchange="updateBlockParam(${idx},'${p.key}',this.checked)"><label>${p.label}</label></div>`;
    case 'select': return `<div class="field-row"><label>${p.label}</label><select onchange="updateBlockParam(${idx},'${p.key}',this.value)">${p.options.map(o => `<option value="${o.value}" ${String(val)===String(o.value)?'selected':''}>${o.label}</option>`).join('')}</select></div>`;
    case 'textarea': return `<div class="field-row" style="flex-direction:column;align-items:stretch"><label style="margin-bottom:3px">${p.label}</label><textarea onchange="updateBlockParam(${idx},'${p.key}',this.value)" rows="3">${escHtml(String(val||p.default||''))}</textarea>${p.desc?`<div class="field-desc">${p.desc}</div>`:''}</div>`;
    case 'dynlist_text': return renderDynlistText(p, val, idx);
    case 'dynlist_richtext': return renderDynlistRichtext(p, val, idx);
    case 'kvlist_ench': return renderKvlistEnch(p, val, idx);
    case 'list_attr': return renderAttrList(p, val, idx);
    case 'list_item': return renderListItem(p, val, idx);
    case 'list_banner': return renderBannerList(p, val, idx);
    case 'list_effect': return renderEffectList(p, val, idx);
    default: return '<div style="color:#9B8F7A;font-size:10px">未知参数类型</div>';
  }
}

function renderDynlistText(p, val, idx){
  const items = Array.isArray(val) && val.length ? val : [''];
  return `<div class="dyn-list"><div style="margin-bottom:3px;font-size:10px;color:var(--mc-text-dim)">${p.label}</div>${items.map((v,i)=>`<div class="dyn-item"><input type="text" value="${escHtml(v)}" onchange="updateDynlistItem(${idx},'${p.key}',${i},this.value)"><button class="dyn-del" onclick="removeDynlistItem(${idx},'${p.key}',${i})">✕</button></div>`).join('')}<button class="dyn-add-btn" onclick="addDynlistItem(${idx},'${p.key}')">+ 添加</button>${p.desc?`<div class="field-desc">${p.desc}</div>`:''}</div>`;
}

// ===== BLOCK ACTIONS =====
function addBlockToWorkspace(componentId){
  const def = COMPONENT_DEFS[componentId];
  if(!def) return;
  const params = {};
  if(def.params){
    def.params.forEach(p => {
      if(p.type === 'dynlist_text') params[p.key] = [...(p.default||[''])];
      else if(p.type === 'dynlist_richtext') params[p.key] = p.default ? p.default.map(d=>[...d]) : [];
      else if(p.type === 'kvlist_ench') params[p.key] = p.default ? p.default.map(d=>({...d})) : [];
      else if(p.type === 'list_attr' || p.type === 'list_item' || p.type === 'list_banner' || p.type === 'list_effect') params[p.key] = [];
      else params[p.key] = p.default;
    });
  }
  workspaceBlocks.push({ componentId, params, disabled: false });
  showToast(`已添加: ${def.icon} ${def.name}`, 'success');
  renderWorkspace();
  setTimeout(()=>{document.getElementById('workspaceArea').scrollTop = document.getElementById('workspaceArea').scrollHeight;}, 50);
}

function removeBlock(idx){
  const block = workspaceBlocks[idx];
  if(!block) return;
  const def = COMPONENT_DEFS[block.componentId];
  workspaceBlocks.splice(idx, 1);
  showToast(`已移除: ${def?def.icon+def.name:'组件'}`, 'info');
  renderWorkspace();
}

function toggleBlock(idx){
  if(workspaceBlocks[idx]){ workspaceBlocks[idx].disabled = !workspaceBlocks[idx].disabled; renderWorkspace(); }
}
function toggleAllBlocks(){
  const allDisabled = workspaceBlocks.every(b => b.disabled);
  workspaceBlocks.forEach(b => b.disabled = !allDisabled);
  renderWorkspace();
}
function clearWorkspace(){
  if(workspaceBlocks.length === 0) return;
  if(!confirm('确定清空所有组件吗？')) return;
  workspaceBlocks = [];
  renderWorkspace();
  showToast('已清空工作区', 'info');
}

// ===== PARAM UPDATES =====
function updateBlockParam(idx, key, value){
  if(workspaceBlocks[idx]){ workspaceBlocks[idx].params[key] = value; generateOutput(); }
}
function updateDynlistItem(idx, key, itemIdx, value){
  if(workspaceBlocks[idx] && workspaceBlocks[idx].params[key]){ workspaceBlocks[idx].params[key][itemIdx] = value; generateOutput(); }
}
function addDynlistItem(idx, key){
  if(workspaceBlocks[idx] && workspaceBlocks[idx].params[key]){ workspaceBlocks[idx].params[key].push(''); renderWorkspace(); }
}
function removeDynlistItem(idx, key, itemIdx){
  if(workspaceBlocks[idx] && workspaceBlocks[idx].params[key]){
    const arr = workspaceBlocks[idx].params[key];
    if(arr.length > 1) arr.splice(itemIdx, 1);
    else arr[0] = '';
    renderWorkspace();
  }
}
function editLoreLine(blockIdx,lineIdx){
  const block=workspaceBlocks[blockIdx];
  if(!block) return;
  const segs=block.params.lines?.[lineIdx];
  _rtState={blockIdx,paramKey:'lines',paramIdx:lineIdx,segments:segs&&Array.isArray(segs)?segs.map(s=>({...s})):[{text:''}]};
  renderRichTextModal();
}
function addLoreLine(idx){
  if(workspaceBlocks[idx]){ if(!workspaceBlocks[idx].params.lines) workspaceBlocks[idx].params.lines=[]; workspaceBlocks[idx].params.lines.push([{text:''}]); renderWorkspace(); }
}
function removeLoreLine(idx,lineIdx){
  if(workspaceBlocks[idx]&&workspaceBlocks[idx].params.lines){
    if(workspaceBlocks[idx].params.lines.length>1) workspaceBlocks[idx].params.lines.splice(lineIdx,1);
    else workspaceBlocks[idx].params.lines[0]=[{text:''}];
    generateOutput(); renderWorkspace();
  }
}
function updateKvlistItem(idx, key, itemIdx, subKey, value){
  if(workspaceBlocks[idx] && workspaceBlocks[idx].params[key]){
    if(!workspaceBlocks[idx].params[key][itemIdx]) workspaceBlocks[idx].params[key][itemIdx] = {};
    workspaceBlocks[idx].params[key][itemIdx][subKey] = value;
    generateOutput();
  }
}
function addKvlistItem(idx, key, defaultKey, defaultVal){
  if(workspaceBlocks[idx] && workspaceBlocks[idx].params[key]){ workspaceBlocks[idx].params[key].push({key:defaultKey||'', val:defaultVal||1}); renderWorkspace(); }
}
function removeKvlistItem(idx, key, itemIdx){
  if(workspaceBlocks[idx] && workspaceBlocks[idx].params[key]){

function addBannerItem(idx, key){

// ===== DRAG & DROP =====
let dragSourceType = null, dragData = null, dragOverIdx = -1;

function onPaletteDragStart(e, componentId){
  dragSourceType='palette'; dragData=componentId;
  e.dataTransfer.effectAllowed='copy'; e.dataTransfer.setData('text/plain',componentId);
  const def=COMPONENT_DEFS[componentId];
  const overlay=document.createElement('div'); overlay.className='drag-overlay';
  overlay.textContent=`${def?def.icon+' '+def.name:componentId}`;
  overlay.style.background=def?CATEGORIES[def.category]?.color||'#666':'#666';
  document.body.appendChild(overlay);
  e.dataTransfer.setDragImage(overlay,30,20);
  setTimeout(()=>overlay.remove(),0);
}
function onBlockDragStart(e, idx){
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'){ e.preventDefault(); return; }
  dragSourceType='block'; dragData=idx; e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',String(idx)); e.target.classList.add('dragging-source');
}
function onBlockDragOver(e, idx){ e.preventDefault(); e.dataTransfer.dropEffect=dragSourceType==='palette'?'copy':'move'; dragOverIdx=idx; }
function onBlockDragEnd(e){ e.target.classList.remove('dragging-source'); document.querySelectorAll('.drop-zone-highlight').forEach(el=>el.classList.remove('drop-zone-highlight')); }
function onBlockDrop(e, idx){
  e.preventDefault(); e.stopPropagation();
  e.target.classList.remove('dragging-source');
  document.querySelectorAll('.drop-zone-highlight').forEach(el=>el.classList.remove('drop-zone-highlight'));
  if(dragSourceType==='palette'&&dragData) addBlockToWorkspace(dragData);
  else if(dragSourceType==='block'&&typeof dragData==='number'&&dragData!==idx){
    const [moved]=workspaceBlocks.splice(dragData,1);
    const targetIdx=dragData<idx?idx-1:idx;
    workspaceBlocks.splice(Math.min(targetIdx,workspaceBlocks.length),0,moved);
    renderWorkspace();
    showToast('已重新排序','info');
  }
  dragSourceType=null; dragData=null; dragOverIdx=-1;
}
function onWorkspaceDragOver(e){
  e.preventDefault();
  if(dragSourceType==='palette'){
    const hint=document.getElementById('workspaceHint');
    hint.style.display='flex'; hint.style.border='2px dashed var(--mc-green)'; hint.style.borderRadius='4px'; hint.style.background='rgba(94,124,22,.08)';
  }
}
function onWorkspaceDrop(e){
  e.preventDefault();
  const hint=document.getElementById('workspaceHint');
  hint.style.border=''; hint.style.background='';
  if(dragSourceType==='palette'&&dragData) addBlockToWorkspace(dragData);
  dragSourceType=null; dragData=null;
}

// ===== OUTPUT GENERATION =====
function generateOutput(){
  const outputPre=document.getElementById('outputPre');
  const placeholder=document.querySelector('#outputContent .placeholder');
  const errorEl=document.getElementById('outputError');
  const config=getBaseConfig();
  const jsonComponents=buildComponentsJSON();
  placeholder.style.display='none'; outputPre.style.display='block'; errorEl.style.display='none';
  try{
    if(outputTab==='command'){
      const cmd=buildGiveCommand(config,jsonComponents);
      outputPre.textContent=cmd;
      document.getElementById('outputCharCount').textContent=`${cmd.length} 字符`;
    } else {
      const json=Object.keys(jsonComponents).length?JSON.stringify(jsonComponents,null,2):'{ /* 暂无组件 */ }';
      outputPre.textContent=json;
      document.getElementById('outputCharCount').textContent=`${json.length} 字符`;
    }
  } catch(e){
    errorEl.textContent='生成输出时出错: '+e.message;
    errorEl.style.display='block';
    outputPre.textContent='';
  }
}

function buildComponentsJSON(){
  const result={};
  workspaceBlocks.forEach(block=>{
    if(block.disabled) return;
    const def=COMPONENT_DEFS[block.componentId];
    if(!def) return;
    try{ const jsonVal=def.toJSON(block.params); if(jsonVal!==null&&jsonVal!==undefined) result[block.componentId]=jsonVal; }catch(e){}
  });
  const namespaced={};
  Object.entries(result).forEach(([key,val])=>{ namespaced['minecraft:'+key]=val; });
  return namespaced;
}

function buildGiveCommand(config,components){
  const itemStr=config.item, target=config.target||'@p', count=config.count||1;
  if(!components||!Object.keys(components).length) return `${config.includePrefix?'/give ':''}${target} ${itemStr}${count>1?' '+count:''}`;
  const compParts=[];
  Object.entries(components).forEach(([key,val])=>{ compParts.push(commandComponentString(key,val)); });
  return `${config.includePrefix?'/give ':''}${target} ${itemStr}[${compParts.join(',')}]${count>1?' '+count:''}`;
}

function commandComponentString(key,val){
  if(val===null||val===undefined) return '';
  if(typeof val==='boolean') return val?key:key+'=false';
  if(typeof val==='number') return key+'='+val;
  if(typeof val==='string') return key+'='+JSON.stringify(val);
  if(Array.isArray(val)) return key+'='+JSON.stringify(val);
  if(typeof val==='object') return key+'='+JSON.stringify(val);
  return key+'='+val;
}

// ===== OUTPUT UI =====
function switchOutputTab(tab){
  outputTab=tab;
  document.querySelectorAll('.output-tab').forEach(t=>{t.classList.toggle('active',t.dataset.tab===tab);});
  generateOutput();
}

function copyOutput(){
  const text=document.getElementById('outputPre').textContent;
  if(!text){ showToast('没有可复制的内容','error'); return; }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('✅ 已复制到剪贴板!','success')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea'); ta.value=text;
  ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta); showToast('✅ 已复制到剪贴板!','success');
}
function downloadOutput(){
  const text=document.getElementById('outputPre').textContent;
  if(!text){ showToast('没有可下载的内容','error'); return; }
  const ext=outputTab==='command'?'.mcfunction':'.json';
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`item_components${ext}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url); showToast('💾 下载成功!','success');
}

function onBaseItemChange(){ generateOutput(); }
function onCustomItemInput(){
  const customInput=document.getElementById('itemCustomInput');
  const select=document.getElementById('itemSelect');
  select.disabled=!!customInput.value.trim();
  generateOutput();
}

  const count=workspaceBlocks.filter(b=>!b.disabled).length;

// ===== UTILITY =====
function escHtml(str){
  const div=document.createElement('div');
  div.textContent=str; return div.innerHTML;
}

// ===== § Color Code → JSON Text Component =====
const COLOR_MAP={'0':'black','1':'dark_blue','2':'dark_green','3':'dark_aqua','4':'dark_red','5':'dark_purple','6':'gold','7':'gray','8':'dark_gray','9':'blue','a':'green','b':'aqua','c':'red','d':'light_purple','e':'yellow','f':'white'};
const FORMAT_MAP={'k':'obfuscated','l':'bold','m':'strikethrough','n':'underlined','o':'italic'};

function parseSectionCodes(str){
  if(!str||typeof str!=='string') return '';
  if(!str.includes('§')) return {text:str};
  const segs=[]; let buf=''; let fmt={};
  for(let i=0;i<str.length;i++){
    if(str[i]==='§'&&i+1<str.length){
      const c=str[++i].toLowerCase();
      if(buf){segs.push({...fmt,text:buf});buf='';}
      if(c==='r') fmt={};
      else if(COLOR_MAP[c]) fmt={color:COLOR_MAP[c]};
      else if(FORMAT_MAP[c]) fmt[FORMAT_MAP[c]]=true;
    } else buf+=str[i];
  }
  if(buf) segs.push({...fmt,text:buf});
  if(!segs.length) return '';
  if(segs.length===1) return segs[0];
  return segs;
}

function toTextComponent(val,defaultItalic){
  if(!val) return null;
  let segs;
  if(Array.isArray(val)){
    segs=val.filter(s=>s.text).map(s=>{
      const tc={text:s.text};
      if(s.color) tc.color=s.color;
      if(s.bold) tc.bold=true;
      if(s.italic) tc.italic=true;
      else if(defaultItalic) tc.italic=false;
      if(s.underlined) tc.underlined=true;
      if(s.strikethrough) tc.strikethrough=true;
      if(s.obfuscated) tc.obfuscated=true;
      return tc;
    });
  } else if(typeof val==='string'){
    const p=parseSectionCodes(val);
    if(p==='') return null;
    if(Array.isArray(p)) segs=p.map(s=>{if(defaultItalic&&s.italic!==false)s.italic=true;return s;});
    else{if(defaultItalic)p.italic=true;segs=[p];}
  }
  if(!segs||!segs.length) return null;
  if(segs.length===1) return segs[0];
  return segs;
}

// ===== RICH TEXT EDITOR =====
let _rtState=null;
const MC_COLORS=[
  {value:'',label:'默认'},{value:'black',label:'§0 黑色'},{value:'dark_blue',label:'§1 深蓝'},
  {value:'dark_green',label:'§2 深绿'},{value:'dark_aqua',label:'§3 深青'},{value:'dark_red',label:'§4 深红'},
  {value:'dark_purple',label:'§5 深紫'},{value:'gold',label:'§6 金色'},{value:'gray',label:'§7 灰色'},
  {value:'dark_gray',label:'§8 深灰'},{value:'blue',label:'§9 蓝色'},{value:'green',label:'§a 绿色'},
  {value:'aqua',label:'§b 青色'},{value:'red',label:'§c 红色'},{value:'light_purple',label:'§d 淡紫'},
  {value:'yellow',label:'§e 黄色'},{value:'white',label:'§f 白色'}
];
const FORMAT_BTNS=[
  {key:'bold',label:'B',title:'加粗'},{key:'italic',label:'I',title:'斜体'},
  {key:'underlined',label:'U',title:'下划线'},{key:'strikethrough',label:'S',title:'删除线'},
  {key:'obfuscated',label:'K',title:'混淆'}
];

function getDefaultSegments(){return[{text:'',color:'',bold:false,italic:false,underlined:false,strikethrough:false,obfuscated:false}];}
function segsFromValue(val){
  if(Array.isArray(val)&&val.length) return val.map(s=>({...getDefaultSegments()[0],...s}));
  if(typeof val==='string'&&val){
    const p=parseSectionCodes(val);
    if(p==='') return getDefaultSegments();
    const arr=Array.isArray(p)?p:[p];
    return arr.map(s=>({...getDefaultSegments()[0],text:s.text||'',color:s.color||'',bold:!!s.bold,italic:!!s.italic,underlined:!!s.underlined,strikethrough:!!s.strikethrough,obfuscated:!!s.obfuscated}));
  }
  return getDefaultSegments();
}

function openRichTextEditor(blockIdx,paramKey){
  const block=workspaceBlocks[blockIdx];
  if(!block) return;
  _rtState={blockIdx,paramKey,segments:segsFromValue(block.params[paramKey])};
  renderRichTextModal();
}
function closeRichTextEditor(){_rtState=null;const el=document.getElementById('rtOverlay');if(el)el.remove();}
function saveRichTextEditor(){
  if(!_rtState) return;
  const{blockIdx,paramKey,paramIdx,segments}=_rtState;
  const clean=segments.filter(s=>s.text&&s.text.trim());
  if(paramIdx!==undefined){
    if(!workspaceBlocks[blockIdx].params[paramKey]) workspaceBlocks[blockIdx].params[paramKey]=[];
    workspaceBlocks[blockIdx].params[paramKey][paramIdx]=clean.length?clean.map(s=>({...s})):[{text:''}];
  } else {
    workspaceBlocks[blockIdx].params[paramKey]=clean.length?clean.map(s=>({...s})):'';
  }
  closeRichTextEditor(); renderWorkspace();
}

function renderRichTextModal(){
  const existing=document.getElementById('rtOverlay'); if(existing)existing.remove();
  const segs=_rtState.segments;
  const segHtml=segs.map((s,i)=>`
    <div class="rt-segment">
      <div class="rt-seg-header"><span class="rt-seg-label">段落 ${i+1}</span><button class="rt-seg-del" onclick="removeRtSeg(${i})" ${segs.length<=1?'style="display:none"':''}>✕ 删除</button></div>
      <div class="rt-seg-row"><input class="rt-seg-text" value="${escHtml(s.text)}" placeholder="输入文本..." onchange="updateRtSeg(${i},'text',this.value)"><select class="rt-seg-color" onchange="updateRtSeg(${i},'color',this.value)">${MC_COLORS.map(c=>`<option value="${c.value}" ${s.color===c.value?'selected':''}>${c.label}</option>`).join('')}</select></div>
      <div class="rt-format-row">${FORMAT_BTNS.map(f=>`<button class="rt-fmt-btn ${s[f.key]?'active':''}" onclick="toggleRtFmt(${i},'${f.key}')" title="${f.title}">${f.label}</button>`).join('')}</div>
    </div>`).join('');
  const previewText=segs.map(s=>s.text||'').join('');
  const html=`<div class="rt-overlay" id="rtOverlay" onclick="if(event.target===this)closeRichTextEditor()"><div class="rt-modal"><div class="rt-header"><span>✏️ JSON 文本编辑器</span><button class="rt-close-btn" onclick="closeRichTextEditor()">✕</button></div><div class="rt-body">${segHtml}<button class="rt-add-btn" onclick="addRtSeg()">+ 添加段落</button><div class="rt-preview"><div class="rt-preview-label">📖 预览</div><div class="rt-preview-text">${escHtml(previewText)||'<span style="color:#6B6050">空文本</span>'}</div></div></div><div class="rt-footer"><button class="rt-btn rt-btn-cancel" onclick="closeRichTextEditor()">取消</button><button class="rt-btn rt-btn-save" onclick="saveRichTextEditor()">✓ 保存</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}
function updateRtSeg(idx,field,value){if(_rtState&&_rtState.segments[idx]){_rtState.segments[idx][field]=value;updateRtPreview();}}
function toggleRtFmt(idx,key){if(_rtState&&_rtState.segments[idx]){_rtState.segments[idx][key]=!_rtState.segments[idx][key];renderRichTextModal();}}
function addRtSeg(){if(_rtState){_rtState.segments.push({text:'',color:'',bold:false,italic:false,underlined:false,strikethrough:false,obfuscated:false});renderRichTextModal();}}
function removeRtSeg(idx){if(_rtState&&_rtState.segments.length>1){_rtState.segments.splice(idx,1);renderRichTextModal();}}
function updateRtPreview(){if(!_rtState)return;const el=document.querySelector('.rt-preview-text');if(el)el.innerHTML=escHtml(_rtState.segments.map(s=>s.text||'').join(''))||'<span style="color:#6B6050">空文本</span>';}

// ===== INIT =====
renderPalette();
renderWorkspace();
</script>
